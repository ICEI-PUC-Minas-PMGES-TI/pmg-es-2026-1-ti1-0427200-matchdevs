<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Empresas</title>
</head>
<body>
    
<div class="container">
    <div class="logo">LOGO</div>

    <h2>Cadastro de Empresa</h2>

    <form>
        <label>Nome da Empresa:</label>
        <input type="text" placeholder="Digite o nome da empresa">

        <label>E-mail de Contato:</label>
        <input type="email" placeholder="Informe o e-mail de contato">

        <label>Telefone:</label>
        <input type="text" placeholder="Digite o telefone">

        <label>Setor:</label>
        <input type="text" placeholder="Digite o setor">

        <label>Localização:</label>
        <input type="text" placeholder="Informe a cidade / bairro">

        <label>Descrição da Empresa:</label>
        <textarea placeholder="Descreva sobre a empresa e suas atividades"></textarea>

        <button type="submit" class="btn">Cadastrar Empresa</button>
    </form>
</div>

    
</body>
</html>
