<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Empresas</title>
</head>

<body>

    <div class="container">
        <div class="left">
            <div class="logo">
                BH WORKS
            </div>

            <h1>Cadastro de Empresa</h1>
            <p class="subtitle">Cadastre sua empresa e encontre talentos.</p>

            <form>
                <label>Nome da Empresa</label>
                <input type="text" placeholder="Digite o nome da empresa" required>

                <label>E-mail</label>
                <input type="email" placeholder="Digite o e-mail" required>

                <label>Telefone</label>
                <input type="text" placeholder="Digite o telefone" required>

                <label>Setor</label>
                <input type="text" placeholder="Digite o setor">

                <label>Localização</label>
                <input type="text" placeholder="Cidade / Bairro">

                <label>Descrição da Empresa</label>

                <textarea placeholder="Descreva sobre sua empresa"></textarea>

                <button class="btn">Cadastrar Empresa</button>
            </form>
        </div>

        <div class="right">
            <div class="overlay">
                <h2>Conectando empresas aos talentos</h2>
                <p>Divulgue vagas e encontre profissionais em Belo Horizonte.</p>
            </div>
        </div>
    </div>

</body>
</html>
