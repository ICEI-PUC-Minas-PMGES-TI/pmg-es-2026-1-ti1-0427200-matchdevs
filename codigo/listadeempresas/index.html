<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>empresas cadastradas</title>
</head>
<body>

<div class="container">
    <div class="logo">empresas</div>
    <h2>listagem de empresas</h2>
    
    <input type="text" id="campopesquisa" placeholder="pesquisar empresa..." class="pesquisa">
    
    <div id="listaempresas"></div>
</div>

<script>
    let dadosempresas = [];

    window.onload = () => {
        carregardados();
    };

    function carregardados() {
        fetch('http://localhost:3000/empresas')
            .then(response => response.json())
            .then(data => {
                dadosempresas = data;
                renderizarempresas();
            })
            //coloquei o catch pra se nao funcionar o json
            .catch(() => {
                fetch('empresas.json')
                    .then(response => response.json())
                    .then(data => {
                        dadosempresas = data.empresas || data;
                        renderizarempresas();
                    })
                    .catch(() => {
                        dadosempresas = [
                            {
                                id: 1,
                                nome: "bhtech solutions",
                                localizacao: "belo horizonte, mg",
                                setor: "tecnologia",
                                descricao: "empresa focada em soluções backend.",
                                email: "contato@bhtech.com",
                                telefone: "(31) 98888-1111"
                            },
                            {
                                id: 2,
                                nome: "inovaweb agency",
                                localizacao: "belo horizonte, mg",
                                setor: "marketing digital",
                                descricao: "agência especializada em campanhas digitais.",
                                email: "contato@inovaweb.com",
                                telefone: "(31) 97777-2222"
                            },
                            {
                                id: 3,
                                nome: "eco energia brasil",
                                localizacao: "são paulo, sp",
                                setor: "energia sustentável",
                                descricao: "soluções em energia solar para residências e empresas.",
                                email: "suporte@ecoenergia.com",
                                telefone: "(11) 96666-3333"
                            }
                        ];
                        renderizarempresas();
                    });
            });
    }

    const container = document.getElementById('listaempresas');
    const pesquisa = document.getElementById('campopesquisa');

    function renderizarempresas() {
        container.innerHTML = "";
        const termo = pesquisa.value.toLowerCase();
        
        for (let i = 0; i < dadosempresas.length; i++) {
            const emp = dadosempresas[i];
            
            const batenome = emp.nome ? emp.nome.toLowerCase().includes(termo) : false;
            const batesetor = emp.setor ? emp.setor.toLowerCase().includes(termo) : false;

            if (batenome || batesetor) {
                const div = document.createElement('div');
                div.className = 'empresa';
                
                div.innerHTML = '<h3>' + emp.nome + '</h3>' +
                                '<p><b>localização:</b> ' + (emp.localizacao || 'não informada') + '</p>' +
                                '<p><b>setor:</b> ' + (emp.setor || 'não informado') + '</p>' +
                                '<p><b>e-mail:</b> ' + (emp.email || 'não informado') + '</p>' +
                                '<p><b>telefone:</b> ' + (emp.telefone || 'não informado') + '</p>' +
                                '<p><b>descrição:</b> ' + (emp.descricao || 'sem descrição') + '</p>' +
                                '<button class="botao-acesso" onclick="notificaracesso(\'' + emp.nome + '\')">botão de acesso</button>';
                container.appendChild(div);
            }
        }
    }

    pesquisa.oninput = renderizarempresas;

    function notificaracesso(nomeempresa) {
        alert('direcionando para os detalhes de: ' + nomeempresa);
    }
</script>

</body>
</html>
