<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - BH Works</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">BH WORKS</div>
            <h1>Entrar</h1>
            <p class="subtitle">Acesse com o e-mail e CNPJ cadastrados.</p>

            <div id="error-msg" class="error-box" style="display:none;"></div>

            <label>E-mail</label>
            <input type="email" id="email" placeholder="Digite o e-mail cadastrado">

            <label>CNPJ <span class="hint">(sua senha)</span></label>
            <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">

            <button class="btn" id="btn-login">Entrar</button>
            <p class="link-login">Não tem cadastro? <a href="cadastroempresa.html">Cadastrar empresa</a></p>
        </div>

        <div class="right">
            <div class="overlay">
                <h2>Conectando empresas aos talentos</h2>
                <p>Divulgue vagas e encontre profissionais em Belo Horizonte.</p>
            </div>
        </div>
    </div>

    <script src="loginempresas.js"></script>
</body>
</html>
