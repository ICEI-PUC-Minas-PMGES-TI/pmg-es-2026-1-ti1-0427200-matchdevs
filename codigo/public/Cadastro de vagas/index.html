<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Vagas</title>
</head>
<body>
    
<div class="container">
    <div class="logo">LOGO</div>

    <h2>Cadastro de Vaga</h2>

    <form>
        <label>Título da Vaga:</label>
        <input type="text" placeholder="Informe o título da vaga">

        <label>Empresa:</label>
        <input type="text" placeholder="Digite o nome da empresa">

        <label>Localização:</label>
        <input type="text" placeholder="Informe a localização da vaga">

        <label>Descrição:</label>
        <textarea placeholder="Descreva as responsabilidades e atividades"></textarea>

        <label>Requisitos:</label>
        <textarea placeholder="Liste os requisitos e qualificações"></textarea>

        <label>Salário:</label>
        <input type="text" placeholder="Informe o salário">

        <label>Tipo de Contrato:</label>
        <select>
            <option value="">Selecione</option>
            <option value="CLT">CLT</option>
            <option value="PJ">PJ</option>
            <option value="Temporário">Temporário</option>
            <option value="Estágio">Estágio</option>
            <option value="Aprendiz">Aprendiz</option>
        </select>

        <button type="submit" class="btn">Cadastrar Vaga</button>
    </form>
</div>

    
</body>
</html>
