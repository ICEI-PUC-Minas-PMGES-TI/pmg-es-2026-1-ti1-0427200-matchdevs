<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Candidato</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo-box">LOGO</div>
  </header>

  <div class="card">
    <h1>Cadastro de Candidato</h1>

    <div class="field">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" placeholder="Digite seu nome completo" autocomplete="name"/>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Crie uma senha" autocomplete="new-password"/>
    </div>

    <div class="field">
      <label for="confirmar">Confirmar Senha</label>
      <input type="password" id="confirmar" placeholder="Confirme a senha" autocomplete="new-password"/>
    </div>

    <div class="field">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" placeholder="Digite seu telefone" autocomplete="tel"/>
    </div>

    <div class="field">
      <label for="localizacao">Localização</label>
      <input type="text" id="localizacao" placeholder="Digite sua cidade / bairro" autocomplete="address-level2"/>
    </div>

    <div class="field">
      <label>Anexar Currículo</label>
      <div class="file-row">
        <label class="file-btn" for="curriculo">Selecionar Arquivo</label>
        <input type="file" id="curriculo" accept=".pdf,.doc,.docx"
               onchange="document.getElementById('fileName').textContent = this.files[0]?.name || 'Nenhum arquivo selecionado'"/>
        <span class="file-name" id="fileName">Nenhum arquivo selecionado</span>
      </div>
    </div>

    <button class="btn-submit">Cadastrar</button>

    <p class="footer-link">Já tem uma conta? <a href="#">Entrar</a></p>
  </div>
<script src="script.js"></script>
</body>
</html>
