<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Vagas</title>
  <link rel="stylesheet" href="assets/css/pesquisa.css" />
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">LOGO</div>
    </header>

    <!-- FILTROS -->
    <section class="filters">

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar vaga ou empresa..." />
      </div>

      <div class="select-group">
        <select>
          <option>Selecione o tipo de vaga</option>
        </select>

        <select>
          <option>Selecione a localização</option>
        </select>
      </div>

    </section>

    <!-- MAPA -->
    <section class="map-section">

      <div class="map">
        <div class="pin pin1">📍</div>
        <div class="pin pin2">📍</div>
        <div class="pin pin3">📍</div>
        <div class="pin pin4">📍</div>
        <div class="pin pin5">📍</div>
        <div class="pin pin6">📍</div>
      </div>

    </section>

    <!-- LISTA DE VAGAS -->
    <section class="jobs">

      <div class="job-card">
        <div class="job-info">
          <h3>Título da vaga</h3>
          <h4>Nome da empresa</h4>
          <p>Localização da Vaga</p>
        </div>

        <button>Ver detalhes</button>
      </div>

      <div class="job-card">
        <div class="job-info">
          <h3>Título da vaga</h3>
          <h4>Nome da empresa</h4>
          <p>Localização da Vaga</p>
        </div>

        <button>Ver detalhes</button>
      </div>

      <div class="job-card">
        <div class="job-info">
          <h3>Título da vaga</h3>
          <h4>Nome da empresa</h4>
          <p>Localização da Vaga</p>
        </div>

        <button>Ver detalhes</button>
      </div>

      <div class="job-card">
        <div class="job-info">
          <h3>Título da vaga</h3>
          <h4>Nome da empresa</h4>
          <p>Localização da Vaga</p>
        </div>

        <button>Ver detalhes</button>
      </div>

    </section>

    <!-- BOTÃO -->
    <div class="register-company">
      <button>Cadastrar Empresa</button>
    </div>

  </div>

</body>
</html>
