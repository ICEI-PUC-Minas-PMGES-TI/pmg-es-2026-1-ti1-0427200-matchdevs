<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Vagas</title>

  <link rel="stylesheet" href="assets/css/pesquisa.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">LOGO</div>
    </header>

    <section class="filters">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="searchInput" type="text" placeholder="Buscar vaga ou empresa..." />
      </div>

      <div class="select-group">
        <select id="typeSelect">
          <option value="">Selecione o tipo de vaga</option>
        </select>

        <select id="locationSelect">
          <option value="">Selecione a localização</option>
        </select>
      </div>
    </section>

    <section class="map-section">
      <div id="map" class="map" aria-label="Mapa com localizações das vagas"></div>
    </section>

    <section class="jobs">
      <div id="jobsList"></div>
      <div id="emptyState" class="empty-state" hidden>
        Nenhuma vaga encontrada com os filtros atuais.
      </div>
    </section>

  </div>

  <div id="detailsModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="document">
      <button class="modal__close" type="button" aria-label="Fechar" data-close>✕</button>
      <div id="modalContent" class="modal__content"></div>
    </div>
  </div>

      region: "BR"
    });
  </script>

  <script src="assets/js/pesquisa.js" defer></script>
</body>
</html>
