<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Vagas</title>

  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>
  <div class="main-wrapper">
    <header class="banner-topo">
        <div class="topbar">
            <a href="home.html" class="logo">BH WORKS</a>
            <nav class="menu">
                <a href="listagem_vagas.html">Vagas</a>
                <a href="listagem_empresas.html">Empresas</a>
                <a href="mapa.html">Mapa</a>
                <a href="login.html">Login</a>
                <a href="sobre.html">Sobre</a>
            </nav>
        </div>
    </header>

    <main class="conteudo">
      <section class="secao">
        <h2>Mapa de Vagas</h2>
        <p>Explore oportunidades por localização em uma visualização geográfica interativa.</p>
      </section>

      <section class="filters">
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="Buscar vaga, empresa ou tecnologia..." />
        </div>

        <div class="select-group">
          <select id="typeSelect">
            <option value="">Tipo de vaga</option>
          </select>

          <select id="locationSelect">
            <option value="">Localização</option>
          </select>
        </div>
        
        <button id="useLocationBtn" class="btn btn-secundario" type="button">
          Usar minha localização
        </button>
      </section>

      <section id="map" class="map" aria-label="Mapa com localizações das vagas"></section>
    </main>
    <footer class="rodape">BH Works - Plataforma de vagas, empresas e candidatos</footer>
  </div>

  <div id="detailsModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="document">
      <button class="modal__close" type="button" aria-label="Fechar" data-close>✕</button>
      <div id="modalContent" class="modal__content"></div>
    </div>
  </div>
