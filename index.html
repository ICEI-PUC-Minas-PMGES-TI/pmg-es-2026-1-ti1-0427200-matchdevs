<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>empresas cadastradas</title>
</head>
<body>

<div class="container">
    <div class="logo">empresas</div>
    <h2>listagem de empresas</h2>
    
    <input type="text" id="campopesquisa" placeholder="pesquisar empresa..." class="pesquisa">
    
    <div id="listaempresas"></div>
</div>

<script>
    const dadosempresas = [
        {
            nome: "tech minas",
            email: "contato@techminas.com",
            telefone: "(31) 98888-1111",
            localizacao: "belo horizonte, mg",
            setor: "tecnologia",
            descricao: "desenvolvimento de sistemas web e aplicativos.",
            website: "https://techminas.com"
        },
        {
            nome: "sabor mineiro",
            email: "atendimento@sabormineiro.com",
            telefone: "(31) 97777-2222",
            localizacao: "contagem, mg",
            setor: "alimentação",
            descricao: "restaurante especializado em comida típica mineira.",
            website: "https://sabormineiro.com"
        },
        {
            nome: "eco energia brasil",
            email: "suporte@ecoenergia.com",
            telefone: "(11) 96666-3333",
            localizacao: "são paulo, sp",
            setor: "energia sustentável",
            descricao: "soluções em energia solar para residências e empresas.",
            website: "https://ecoenergia.com"
        }
    ];

    const container = document.getElementById('listaempresas');
    const pesquisa = document.getElementById('campopesquisa');

    function renderizarempresas() {
        container.innerHTML = "";
        const termo = pesquisa.value.toLowerCase();
        
        for (let i = 0; i < dadosempresas.length; i++) {
            const emp = dadosempresas[i];
            
            const batenome = emp.nome.toLowerCase().includes(termo);
            const batesetor = emp.setor.toLowerCase().includes(termo);

            if (batenome || batesetor) {
                const div = document.createElement('div');
                div.className = 'empresa';
                div.innerHTML = '<h3>' + emp.nome + '</h3>' +
                                '<p><b>localização:</b> ' + emp.localizacao + '</p>' +
                                '<p><b>setor:</b> ' + emp.setor + '</p>' +
                                '<p><b>e-mail:</b> ' + emp.email + '</p>' +
                                '<p><b>telefone:</b> ' + emp.telefone + '</p>' +
                                '<p><b>descrição:</b> ' + emp.descricao + '</p>' +
                                '<a href="' + emp.website + '" target="_blank" class="botao-acesso">botão de acesso</a>';
                container.appendChild(div);
            }
        }
    }

    pesquisa.oninput = renderizarempresas;
    renderizarempresas();
</script>

</body>
</html>
